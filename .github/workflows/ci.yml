name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash jq bats-core
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install jq -y
          # bats-core via npm to avoid scoop on CI
          npm install -g bats

      - name: Verify tool versions
        run: |
          bash --version | head -1
          jq --version
          bats --version

      - name: Run bats suite
        run: bats test/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: 'test'
